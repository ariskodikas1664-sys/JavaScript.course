<!DOCTYPE html>
<html>
<head>
<title>5 Character Brute Force Decryptor</title>

<style>
body{
    font-family: Arial;
    background:#712f77;
    color:white;
    text-align:center;
    padding:40px;
}

.container{
    background:#35132f;
    padding:30px;
    border-radius:10px;
    width:420px;
    margin:auto;
}

input{
    padding:10px;
    font-size:16px;
    width:220px;
    text-align:center;
}

button{
    padding:10px 20px;
    font-size:16px;
    margin-top:10px;
    cursor:pointer;
    background:#22c55e;
    border:none;
    color:white;
    border-radius:5px;
}

#output{
    margin-top:20px;
    font-size:18px;
}
</style>

</head>

<body>

<div class="container">

<h2>5 Character Brute Force Decryptor</h2>

<p>Allowed: A-Z, a-z, 0-9</p>

<input id="target" maxlength="5" placeholder="Ex: Ab3D9">

<br><br>

<button onclick="startBruteForce()">Start Brute Force</button>

<div id="output"></div>

</div>

<script>

const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

function startBruteForce(){

let target = document.getElementById("target").value;
let output = document.getElementById("output");

if(target.length !== 5){
    output.innerHTML = "Enter exactly 5 characters.";
    return;
}

output.innerHTML = "Searching...";

setTimeout(()=>{

let attempts = 0;

for(let a=0;a<chars.length;a++){
for(let b=0;b<chars.length;b++){
for(let c=0;c<chars.length;c++){
for(let d=0;d<chars.length;d++){
for(let e=0;e<chars.length;e++){

let guess =
chars[a] +
chars[b] +
chars[c] +
chars[d] +
chars[e];

attempts++;

if(guess === target){

output.innerHTML =
"Found: <b>"+guess+"</b><br>Attempts: "+attempts;

return;
}

}}}}}

output.innerHTML="Not found";

},100);

}

</script>

</body>
</html>
